 <h1 style="text-align:center;">TAMILNADU<h1>
 <p>Tamilnadu is one of the 28 states of India. Its capital and largest city is Chennai. Tamil Nadu lies in the southernmost part of the Indian Peninsula and is bordered by the States of puducherry, Kerala, Karnataka, Andhra Pradesh. </p>
