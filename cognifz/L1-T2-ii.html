  <h1>Alert message</h1>
  <script>
    var hour = new Date().getHours();
    var message;

    if (hour < 12)
   {
     message = "Hi everyone, Good Morning!";
   } 
   else if (hour < 18)
  {
    message = "Hello, Good Afternoon!";
  } 
  else {
    message = "Hi guys,Good Evening!";
  }

   alert(message);
  </script>
